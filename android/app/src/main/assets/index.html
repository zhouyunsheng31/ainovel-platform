<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="description" content="AI小说拆书系统">
    <meta name="theme-color" content="#6366f1">
    <title>AI小说拆书系统</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.125em;fill:currentColor}.icon-2x{font-size:1.5em}</style>
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <svg class="icon icon-2x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
                    <span>AI小说拆书系统</span>
                </div>
                <nav class="nav-links">
                    <a href="#" class="nav-link active" data-page="upload"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>上传</a>
                    <a href="#" class="nav-link" data-page="library"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>书库</a>
                    <a href="#" class="nav-link" data-page="settings"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.991l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.127.332-.183.582-.495.644-.869l.214-1.28z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>设置</a>
                </nav>
                <div class="header-actions">
                    <button class="btn-icon" id="themeToggle" title="切换主题"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.334.266-2.597.748-3.752A9.753 9.753 0 0112 2.25c5.385 0 9.75 4.365 9.75 9.75 0 1.334-.266 2.597-.748 3.752a9.71 9.71 0 01-3.002 4.25z"/></svg></button>
                </div>
            </div>
        </header>
        <main class="main-content">
            <section id="page-upload" class="page active">
                <div class="page-header"><h1>上传小说文件</h1><p class="page-desc">支持 epub、txt、word、pdf 格式</p></div>
                <div class="upload-section">
                    <div id="fileUploader"></div>
                    <div class="book-info-form hidden" id="bookInfoForm">
                        <h3>书籍信息</h3>
                        <div class="form-grid">
                            <div class="form-group"><label for="bookTitle">书名</label><input type="text" id="bookTitle" class="form-input" placeholder="输入书名"></div>
                            <div class="form-group"><label for="bookAuthor">作者</label><input type="text" id="bookAuthor" class="form-input" placeholder="输入作者"></div>
                            <div class="form-group full-width"><label for="bookDescription">简介</label><textarea id="bookDescription" class="form-input" rows="3" placeholder="书籍简介"></textarea></div>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-secondary" id="btnReset">重新选择</button>
                            <button class="btn btn-primary" id="btnStartProcess">开始处理</button>
                        </div>
                    </div>
                </div>
                <div class="progress-section hidden" id="progressSection"><h2>处理进度</h2><div id="progressMonitor"></div></div>
            </section>
            <section id="page-library" class="page">
                <div class="page-header"><h1>我的书库</h1><p class="page-desc">查看已处理的书籍</p></div>
                <div class="library-toolbar">
                    <div class="search-box"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg><input type="text" id="searchInput" placeholder="搜索书籍..."></div>
                    <div class="filter-group"><select id="statusFilter" class="form-select"><option value="">全部状态</option><option value="completed">已完成</option><option value="processing">处理中</option></select></div>
                </div>
                <div class="book-grid" id="bookGrid"><div class="empty-state"><svg class="icon icon-2x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25v14.25"/></svg><p>暂无书籍</p></div></div>
            </section>
            <section id="page-detail" class="page">
                <div class="detail-header"><button class="btn btn-ghost" id="btnBackToLibrary">返回书库</button><div class="book-meta" id="bookMeta"></div></div>
            </section>
            <section id="page-settings" class="page">
                <div class="page-header"><h1>系统设置</h1><p class="page-desc">配置参数</p></div>
                <div class="settings-container">
                    <div class="settings-section">
                        <h3>API 配置</h3>
                        <div class="form-group"><label for="apiBaseUrl">API Base URL</label><input type="text" id="apiBaseUrl" class="form-input" value="http://localhost:8000/api/v1"></div>
                        <div class="form-group"><label for="apiKey">API Key</label><input type="password" id="apiKey" class="form-input" placeholder="输入API密钥"></div>
                    </div>
                    <div class="settings-section">
                        <h3>模型配置</h3>
                        <div class="form-group"><label for="modelName">模型名称</label><input type="text" id="modelName" class="form-input" value="gpt-5.4-nano"></div>
                        <div class="form-group"><label for="temperature">Temperature</label><div class="range-input"><input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7"><span class="range-value" id="temperatureValue">0.7</span></div></div>
                        <div class="form-group"><label for="maxTokens">Max Tokens</label><input type="number" id="maxTokens" class="form-input" value="4096"></div>
                    </div>
                    <div class="settings-section">
                        <h3>分割设置</h3>
                        <div class="form-group"><label for="chapterSize">章节字数</label><input type="number" id="chapterSize" class="form-input" value="2000"></div>
                    </div>
                    <div class="settings-section">
                        <h3>开发选项</h3>
                        <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="mockMode" checked>启用 Mock 模式</label></div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn btn-secondary" id="btnResetSettings">恢复默认</button>
                        <button class="btn btn-primary" id="btnSaveSettings">保存设置</button>
                    </div>
                </div>
            </section>
        </main>
        <div id="toast-container" class="toast-container"></div>
        <div id="modalContainer"></div>
    </div>
    <script src="js/bundle.js"></script>
</body>
</html>
